<!DOCTYPE html>
<html>
<head>
    <title>Test Document Detection</title>
</head>
<body>
    <h1>Testing Document Detection for Farmer 30809</h1>
    <div id="results"></div>
    
    <script type="module">
        // Test the document URLs directly
        const baseUrl = "https://ahkkuzseckcrpjbdohth.supabase.co/storage/v1/object/public/documents";
        const farmerCode = "30809";
        
        const documentTypes = [
            { name: "aadhaar", extensions: ["png", "jpg", "jpeg", "pdf"] },
            { name: "agreement", extensions: ["pdf", "png", "jpg", "jpeg"] },
            { name: "bank", extensions: ["pdf", "png", "jpg", "jpeg"] },
            { name: "rtc", extensions: ["pdf", "png", "jpg", "jpeg"] }
        ];
        
        async function testDocuments() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Testing document availability...</p>';
            
            const foundDocuments = [];
            
            for (const docType of documentTypes) {
                for (const ext of docType.extensions) {
                    const fileName = `${farmerCode}_${docType.name}.${ext}`;
                    const testUrl = `${baseUrl}/${farmerCode}/${fileName}`;
                    
                    try {
                        const response = await fetch(testUrl, { method: 'HEAD' });
                        if (response.ok) {
                            foundDocuments.push({ name: fileName, url: testUrl, type: docType.name });
                            break; // Found this document type, move to next type
                        }
                    } catch (error) {
                        // File doesn't exist, continue trying other extensions
                    }
                }
            }
            
            // Display results
            let html = `<h2>Found ${foundDocuments.length} documents for farmer ${farmerCode}:</h2>`;
            
            if (foundDocuments.length === 0) {
                html += '<p style="color: red;">No documents found</p>';
            } else {
                html += '<ul>';
                foundDocuments.forEach(doc => {
                    html += `<li><strong>${doc.type}:</strong> <a href="${doc.url}" target="_blank">${doc.name}</a> ✅</li>`;
                });
                html += '</ul>';
                
                if (foundDocuments.length === 4) {
                    html += '<p style="color: green; font-weight: bold;">✅ All 4 documents found! Farmer should be marked as "Submitted"</p>';
                } else {
                    html += `<p style="color: orange;">⚠️ Only ${foundDocuments.length}/4 documents found. Farmer will be marked as "Incomplete"</p>`;
                }
            }
            
            results.innerHTML = html;
        }
        
        // Run test when page loads
        testDocuments();
    </script>
</body>
</html>
